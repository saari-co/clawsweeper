name: ClawSweeper Live Dashboard CI Status

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - ClawSweeper
      - ClawSweeper Commit Review
      - repair cluster worker
      - repair comment router
    types: [completed]
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read

concurrency:
  group: clawsweeper-live-dashboard-ci
  cancel-in-progress: true

jobs:
  refresh:
    name: Refresh live dashboard PR CI
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      CLAWSWEEPER_STATUS_URL: https://clawsweeper.openclaw.ai
      CLAWSWEEPER_STATUS_INGEST_URL: https://clawsweeper.openclaw.ai/api/events
      CLAWSWEEPER_STATUS_INGEST_TOKEN: ${{ secrets.CLAWSWEEPER_STATUS_INGEST_TOKEN }}
      CLAWSWEEPER_STATUS_CI_LIMIT: "30"
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          filter: blob:none
          fetch-depth: 1

      - name: Refresh PR CI telemetry
        run: node scripts/dashboard-refresh-ci.mjs
