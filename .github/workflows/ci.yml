name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "apply-report.json"
      - "repair-apply-report.json"
      - "jobs/**"
      - "records/**"
      - "results/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: pnpm check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            config
            dashboard
            docs
            instructions
            prompts
            schema
            scripts
            src
            test
            .oxfmtrc.json
            AGENTS.md
            README.md
            package.json
            pnpm-lock.yaml
            tsconfig.json
            tsconfig.repair.json
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/setup-pnpm

      - name: Run check
        run: pnpm run check
